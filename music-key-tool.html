<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord & Scale</title>
<style>
  :root {
    --bg:#f5f5f7; --surface:#fff; --surface2:#f5f5f7;
    --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.05);
    --text:#1d1d1f; --text2:#6e6e73; --text3:#aeaeb2;
    --blue:#0071e3; --blue-bg:rgba(0,113,227,0.10);
    --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;
    min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased}

  .header{padding:52px 24px 0;max-width:560px;margin:0 auto}
  .header h1{font-size:34px;font-weight:700;letter-spacing:-.5px}
  .header p{font-size:15px;color:var(--text2);margin-top:4px}

  .segment{display:flex;background:rgba(118,118,128,.12);border-radius:9px;padding:2px;
    width:calc(100% - 48px);max-width:512px;margin:20px auto 0}
  .seg-btn{flex:1;padding:7px 0;border:none;background:transparent;font-family:inherit;
    font-size:13px;font-weight:500;color:var(--text2);border-radius:7px;cursor:pointer;transition:all .2s}
  .seg-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 1px rgba(0,0,0,.08)}

  .key-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    padding:20px;max-width:560px;margin:0 auto}
  .key-btn{aspect-ratio:1;background:#fff;border:1px solid var(--border);border-radius:var(--r);
    font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;
    transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;
    line-height:1.2;box-shadow:0 1px 2px rgba(0,0,0,.04);letter-spacing:-.2px}
  .key-btn .enh{font-size:9px;color:var(--text3);margin-top:1px}
  .key-btn:active{transform:scale(.92)}
  .key-btn.sel{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,113,227,.3)}
  .key-btn.sel .enh{color:rgba(255,255,255,.65)}
  .key-btn.minor-mode.sel{background:#1c1c1e;border-color:#1c1c1e;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25)}

  .result{max-width:560px;margin:0 auto;padding:0 20px;animation:fu .25s ease both}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .card-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}

  .penta-main{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .penta-key{font-size:36px;font-weight:600;letter-spacing:-1px;color:var(--blue);line-height:1}
  .penta-key.dk{color:var(--text)}
  .penta-sub{font-size:13px;color:var(--text2)}
  .notes-row{display:flex;flex-wrap:wrap;gap:6px}
  .note-tag{background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:500;padding:4px 10px;border-radius:20px}
  .note-tag.dk{background:rgba(0,0,0,.06);color:var(--text)}
  .div{height:1px;background:var(--border2);margin:14px 0}
  .hint{font-size:12px;color:var(--text2);line-height:1.55}
  .hint strong{color:var(--text);font-weight:500}

  .chords-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px}
  .chords-head{padding:16px 20px 4px}
  .chord-row{border-bottom:1px solid var(--border2)}
  .chord-row:last-child{border-bottom:none}
  .chord-sum{display:flex;align-items:center;padding:12px 20px;cursor:pointer;gap:12px;user-select:none;-webkit-user-select:none}
  .chord-sum:active{background:rgba(0,0,0,.03)}
  .cbadge{width:42px;height:42px;border-radius:10px;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;
    color:var(--text);flex-shrink:0;letter-spacing:-.3px}
  .cbadge.ton{background:var(--blue-bg);color:var(--blue)}
  .cbadge.dom{background:rgba(255,149,0,.10);color:#bf7000}
  .cinfo{flex:1;min-width:0}
  .cname{font-size:16px;font-weight:500;letter-spacing:-.3px}
  .crole{font-size:12px;color:var(--text2);margin-top:1px}
  .chev{font-size:14px;color:var(--text3);transition:transform .22s;flex-shrink:0}
  .chord-row.open .chev{transform:rotate(90deg)}
  .tab-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .chord-row.open .tab-panel{max-height:320px}
  .tab-inner{padding:4px 20px 18px;display:flex;justify-content:center}

  /* ── CHORD DIAGRAM ── */
  /*
    Layout (top→bottom):
    1. open/muted row  (×  ○  ○ etc.)
    2. chord name above nut
    3. nut (thick bar)
    4. fret rows
    Each cell = one string crossing one fret
    Strings left→right: E A D G B e
  */
  .dgm{display:inline-block;font-family:-apple-system,sans-serif;user-select:none}
  .dgm-title{font-size:13px;font-weight:600;text-align:center;margin-bottom:4px;letter-spacing:-.2px}

  /* open/muted symbols above nut */
  .dgm-top{display:flex;align-items:flex-end;margin-bottom:2px}
  .dgm-top-spacer{width:18px;flex-shrink:0} /* aligns with fret numbers */
  .dgm-top-cells{display:flex}
  .dgm-top-cell{width:26px;text-align:center;font-size:11px;color:var(--text2);line-height:1}
  .dgm-top-cell.x{color:var(--text3)}

  /* nut */
  .dgm-nut-row{display:flex;align-items:center;margin-bottom:0}
  .dgm-nut-spacer{width:18px;flex-shrink:0}
  .dgm-nut{flex:1;height:5px;background:var(--text);border-radius:1px}

  /* fret rows */
  .dgm-row{display:flex;align-items:center}
  .dgm-fnum{width:18px;font-size:9px;color:var(--text3);text-align:right;padding-right:3px;flex-shrink:0;line-height:26px}
  .dgm-cells{display:flex;border-left:1.5px solid var(--text2)}
  .dgm-cell{width:26px;height:26px;border-right:1.5px solid var(--text2);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;position:relative}
  /* remove bottom border on last row */
  .dgm-row:last-child .dgm-cell{border-bottom:none}
  /* add top border on first fret row */
  .dgm-row:first-child .dgm-cell{border-top:1px solid var(--border)}

  /* dot */
  .dot{width:18px;height:18px;border-radius:50%;background:#1d1d1f;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:#fff;position:relative;z-index:2}
  /* barre: spans across marked strings */
  .barre-cell{position:relative}
  .barre-seg{position:absolute;top:50%;transform:translateY(-50%);
    height:18px;border-radius:9px;background:#1d1d1f;z-index:2}

  /* fret position label below diagram */
  .dgm-pos{font-size:10px;color:var(--text3);text-align:center;margin-top:4px}

  .empty{text-align:center;padding:52px 24px}
  .empty-icon{font-size:38px;opacity:.3;margin-bottom:10px}
  .empty-text{font-size:15px;color:var(--text2)}
</style>
</head>
<body>

<div class="header">
  <h1>Chord &amp; Scale</h1>
  <p>Tonalità, accordi e pentatonica</p>
</div>

<div class="segment">
  <button class="seg-btn active" onclick="setMode('major')" id="btn-major">Maggiori</button>
  <button class="seg-btn" onclick="setMode('minor')" id="btn-minor">Minori</button>
</div>

<div class="key-grid" id="keyGrid"></div>
<div id="result"></div>

<script>
// ─── MUSIC THEORY ──────────────────────────────────────────────────────────
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const fb=n=>FLAT[n]||n;

const MAJ_INT=[0,2,4,5,7,9,11], MIN_INT=[0,2,3,5,7,8,10];
const PM=[0,3,5,7,10], PMj=[0,2,4,7,9];
const sc=(r,iv)=>{const i=NOTES.indexOf(r);return iv.map(x=>NOTES[(i+x)%12])};
const relMin=r=>NOTES[(NOTES.indexOf(r)+9)%12];
const relMaj=r=>NOTES[(NOTES.indexOf(r)+3)%12];

const MQ=['maj','min','min','maj','maj','min','dim'];
const MR=['I – Tonica','II – Supertonica','III – Mediante','IV – Sottodominante','V – Dominante','VI – Rel. minore','VII – Sensibile'];
const mQ=['min','dim','maj','min','min','maj','maj'];
const mR=['I – Tonica','II – Sopratonica','III – Mediante','IV – Sottodominante','V – Dominante','VI – Sopradominante','VII – Sottotonica'];

function csym(note,q){const n=fb(note);return q==='maj'?n:q==='min'?n+'m':n+'°'}

// ─── CHORD DATABASE ────────────────────────────────────────────────────────
/*
  Each chord:
    name: display string
    open: array of 6 [E A D G B e low→high], values: 'x'=mute, 'o'=open, null=fretted
    baseFret: first fret shown (1 = includes open/nut)
    dots: [ [string_index_0to5, fret_number_absolute, finger_number], ... ]
            string 0=E(low), 1=A, 2=D, 3=G, 4=B, 5=e(high)
    barre: { fret, fromStr, toStr }  (optional)

  Verified against standard chord charts (open positions where possible).
*/
const DB = {
  // ━━━ MAJOR OPEN POSITIONS ━━━
  'C': {
    open:['x','o',null,null,null,'o'],
    baseFret:1,
    dots:[ [1,3,3],[2,2,2],[3,1,1] ]
    // A:open, D:3rd fret f3, G:2nd fret f2, B:1st fret f1, e:open, E:mute
  },
  'D': {
    open:['x','x','o',null,null,null],
    baseFret:1,
    dots:[ [2,2,1],[3,3,3],[4,2,2] ]
    // D:open, G:2nd f1, B:3rd f3, e:2nd f2
  },
  'E': {
    open:[null,'o',null,null,'o','o'],
    baseFret:1,
    dots:[ [0,2,2],[1,2,3],[3,1,1] ]
    // E:2nd f2, A:open, D:2nd f3, G:1st f1, B:open, e:open
  },
  'F': {
    open:[null,null,null,null,null,null],
    baseFret:1,
    barre:{fret:1,fromStr:0,toStr:5},
    dots:[ [1,3,3],[2,3,4],[3,2,2] ]
    // full barre 1st fret, A:3rd f3, D:3rd f4, G:2nd f2
  },
  'G': {
    open:[null,'o',null,null,'o',null],
    baseFret:1,
    dots:[ [0,2,1],[1,2,2],[5,3,4] ]
    // E:2nd f1... Actually standard G: E-low:3rd f2, A:2nd f1, B:open, e:3rd f3
    // Let's use the standard 3-finger G:
  },
  'A': {
    open:['x','o',null,null,null,'o'],
    baseFret:1,
    dots:[ [1,2,1],[2,2,2],[3,2,3] ]
    // A:open, D:2nd f1, G:2nd f2, B:2nd f3, e:open
    // (index barre or 3 fingers on 2nd fret D G B)
  },
  'B': {
    open:['x',null,null,null,null,null],
    baseFret:1,
    barre:{fret:2,fromStr:1,toStr:5},
    dots:[ [1,4,3],[2,4,4],[3,4,4] ]
    // barre 2nd, D:4th f3, G:4th f4, B:4th f4 — standard B barre
  },
  'C#': {
    open:['x',null,null,null,null,null],
    baseFret:4,
    barre:{fret:4,fromStr:1,toStr:5},
    dots:[ [1,6,3],[2,6,4],[3,6,4] ]
  },
  'D#': {
    open:['x',null,null,null,null,null],
    baseFret:6,
    barre:{fret:6,fromStr:1,toStr:5},
    dots:[ [1,8,3],[2,8,4],[3,8,4] ]
  },
  'F#': {
    open:[null,null,null,null,null,null],
    baseFret:2,
    barre:{fret:2,fromStr:0,toStr:5},
    dots:[ [1,4,3],[2,4,4],[3,3,2] ]
  },
  'G#': {
    open:[null,null,null,null,null,null],
    baseFret:4,
    barre:{fret:4,fromStr:0,toStr:5},
    dots:[ [1,6,3],[2,6,4],[3,5,2] ]
  },
  'A#': {
    open:[null,null,null,null,null,null],
    baseFret:1,
    barre:{fret:1,fromStr:0,toStr:5},
    dots:[ [1,3,3],[2,3,4],[3,2,2] ]
  },

  // ━━━ MINOR OPEN POSITIONS ━━━
  'Am': {
    open:['x','o',null,null,'o','o'],
    baseFret:1,
    dots:[ [1,2,2],[2,2,3],[3,1,1] ]
    // A:open, D:2nd f2, G:2nd f3, B:1st f1, e:open
  },
  'Bm': {
    open:['x',null,null,null,null,null],
    baseFret:2,
    barre:{fret:2,fromStr:1,toStr:5},
    dots:[ [1,4,3],[2,4,4] ]
  },
  'Cm': {
    open:['x',null,null,null,null,null],
    baseFret:3,
    barre:{fret:3,fromStr:1,toStr:5},
    dots:[ [1,5,3],[2,5,4] ]
  },
  'Dm': {
    open:['x','x','o',null,null,'x'],
    baseFret:1,
    dots:[ [2,3,3],[3,2,2],[4,1,1] ]
    // D:open, G:3rd f3 — wait standard Dm: D:open, G:2nd f1 or: e:1st f1, B:3rd f3, G:2nd f2
    // Standard Dm: x x 0 2 3 1
  },
  'Em': {
    open:['o','o',null,null,'o','o'],
    baseFret:1,
    dots:[ [1,2,2],[2,2,3] ]
    // E:open, A:open, D:2nd f2, G:2nd f3, B:open, e:open
  },
  'Fm': {
    open:[null,null,null,null,null,null],
    baseFret:1,
    barre:{fret:1,fromStr:0,toStr:5},
    dots:[ [1,3,3],[2,3,4] ]
  },
  'Gm': {
    open:[null,null,null,null,null,null],
    baseFret:3,
    barre:{fret:3,fromStr:0,toStr:5},
    dots:[ [1,5,3],[2,5,4] ]
  },
  'C#m': {
    open:['x',null,null,null,null,null],
    baseFret:4,
    barre:{fret:4,fromStr:1,toStr:5},
    dots:[ [1,6,3],[2,6,4] ]
  },
  'D#m': {
    open:['x',null,null,null,null,null],
    baseFret:6,
    barre:{fret:6,fromStr:1,toStr:5},
    dots:[ [1,8,3],[2,8,4] ]
  },
  'F#m': {
    open:[null,null,null,null,null,null],
    baseFret:2,
    barre:{fret:2,fromStr:0,toStr:5},
    dots:[ [1,4,3],[2,4,4] ]
  },
  'G#m': {
    open:[null,null,null,null,null,null],
    baseFret:4,
    barre:{fret:4,fromStr:0,toStr:5},
    dots:[ [1,6,3],[2,6,4] ]
  },
  'A#m': {
    open:[null,null,null,null,null,null],
    baseFret:1,
    barre:{fret:1,fromStr:0,toStr:5},
    dots:[ [1,3,3],[2,3,4] ]
  },

  // ━━━ DIM ━━━
  'B°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,1,1],[3,2,2],[4,1,1] ] },
  'C°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,2,2],[3,3,3],[4,2,1] ] },
  'D°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,3,2],[3,4,3],[4,3,1] ] },
  'E°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,5,2],[3,6,3],[4,5,1] ], baseFret:3 },
  'F°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,1,1],[3,2,2],[4,1,1] ] },
  'G°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,2,2],[3,3,3],[4,2,1] ] },
  'A°':  { open:['x','x',null,null,null,'x'], baseFret:1, dots:[ [2,3,2],[3,4,3],[4,3,1] ] },
};

// Fix some chords with correct standard fingerings
// C: x32010  →  E:x A:3 D:2 G:0 B:1 e:0
DB['C'] = { open:['x',null,null,'o',null,'o'], baseFret:1, dots:[ [0,2,2 ],[1,3,3],[4,1,1] ] };
// x=E muted, A:3rd fret f3, D:2nd fret f2, G:open, B:1st fret f1, e:open
// string indices: 0=E,1=A,2=D,3=G,4=B,5=e
DB['C'] = {
  open:['x',null,null,'o',null,'o'],
  baseFret:1,
  dots:[
    [1,3,3],  // A string, 3rd fret, finger 3
    [2,2,2],  // D string, 2nd fret, finger 2
    [4,1,1],  // B string, 1st fret, finger 1
  ]
};
// D: xx0232
DB['D'] = {
  open:['x','x','o',null,null,null],
  baseFret:1,
  dots:[
    [3,2,1],  // G:2nd f1
    [4,3,3],  // B:3rd f3
    [5,2,2],  // e:2nd f2
  ]
};
// E: 022100
DB['E'] = {
  open:[null,'o','o',null,'o','o'],
  baseFret:1,
  dots:[
    [0,2,2],  // E:2nd f2
    [1,2,3],  // A:2nd f3
    [3,1,1],  // G:1st f1
  ]
};
// G: 320003
DB['G'] = {
  open:[null,null,null,'o','o',null],
  baseFret:1,
  dots:[
    [0,3,2],  // E:3rd f2
    [1,2,1],  // A:2nd f1
    [5,3,3],  // e:3rd f3
  ]
};
// A: x02220
DB['A'] = {
  open:['x','o',null,null,null,'o'],
  baseFret:1,
  dots:[
    [2,2,1],  // D:2nd f1
    [3,2,2],  // G:2nd f2
    [4,2,3],  // B:2nd f3
  ]
};
// Am: x02210
DB['Am'] = {
  open:['x','o',null,null,'o','o'],
  baseFret:1,
  dots:[
    [2,2,2],  // D:2nd f2
    [3,2,3],  // G:2nd f3
    [4,1,1],  // B:1st f1
  ]
};
// Em: 022000
DB['Em'] = {
  open:['o','o',null,null,'o','o'],
  baseFret:1,
  dots:[
    [2,2,2],  // D:2nd f2
    [3,2,3],  // G:2nd f3 — wait, Em is 022000: A:2, D:2, rest open
    // Actually Em standard: 0 2 2 0 0 0
  ]
};
DB['Em'] = {
  open:['o',null,null,'o','o','o'],
  baseFret:1,
  dots:[
    [1,2,2],  // A:2nd f2
    [2,2,3],  // D:2nd f3
  ]
};
// Dm: xx0231
DB['Dm'] = {
  open:['x','x','o',null,null,null],
  baseFret:1,
  dots:[
    [3,2,1],  // G:2nd f1 — wait Dm: xx0231: D:open, G:2, B:3, e:1
    [4,3,3],  // B:3rd f3
    [5,1,1],  // e:1st f1
  ]
};

// ─── RENDER DIAGRAM ────────────────────────────────────────────────────────
function renderDiagram(key, quality) {
  const sym = quality==='min' ? key+'m' : quality==='dim' ? key+'°' : key;
  const data = DB[sym];
  if (!data) return `<div style="font-size:12px;color:var(--text3);padding:16px 0;text-align:center">Diagramma non disponibile</div>`;

  const {open, baseFret, dots, barre} = data;
  const FRETS = 4;
  const STR = 6; // 0=E low, 5=e high
  const strLabels = ['E','A','D','G','B','e'];

  // Build lookup: dotMap[fret][string] = finger
  const dotMap = {};
  (dots||[]).forEach(([str, fret, finger]) => {
    const rf = fret - baseFret + 1; // relative fret (1-based)
    if (!dotMap[rf]) dotMap[rf] = {};
    dotMap[rf][str] = finger;
  });

  let h = `<div class="dgm">`;
  h += `<div class="dgm-title">${csym(key,quality)}</div>`;

  // Top row: open/muted symbols
  h += `<div class="dgm-top"><div class="dgm-top-spacer"></div><div class="dgm-top-cells">`;
  for (let s=0; s<STR; s++) {
    const o = open[s];
    if (o==='x') h += `<div class="dgm-top-cell x">×</div>`;
    else if (o==='o') h += `<div class="dgm-top-cell">○</div>`;
    else h += `<div class="dgm-top-cell"></div>`;
  }
  h += `</div></div>`;

  // Nut (only if baseFret===1)
  if (baseFret === 1) {
    h += `<div class="dgm-nut-row"><div class="dgm-nut-spacer"></div><div class="dgm-nut"></div></div>`;
  }

  // Fret rows (4 rows)
  for (let rf=1; rf<=FRETS; rf++) {
    const absFret = baseFret + rf - 1;
    h += `<div class="dgm-row">`;
    h += `<div class="dgm-fnum">${absFret}</div>`;
    h += `<div class="dgm-cells">`;

    // Barre logic: does this fret have a barre?
    const hasBarreHere = barre && barre.fret === absFret;
    const barreFrom = hasBarreHere ? barre.fromStr : -1;
    const barreTo   = hasBarreHere ? barre.toStr   : -1;

    for (let s=0; s<STR; s++) {
      const inBarre = hasBarreHere && s >= barreFrom && s <= barreTo;
      const hasDot  = dotMap[rf] && dotMap[rf][s] !== undefined;

      h += `<div class="dgm-cell" style="position:relative">`;
      if (inBarre) {
        // Draw barre bar across all barre cells
        if (s === barreFrom) {
          // leftmost barre cell: start the bar
          const span = (barreTo - barreFrom + 1) * 26; // 26px per cell
          h += `<div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);
            width:${span - 8}px;height:18px;background:#1d1d1f;border-radius:9px;z-index:3"></div>`;
        }
        if (hasDot) {
          h += `<div class="dot" style="z-index:4;background:#fff;color:#1d1d1f;border:2px solid #1d1d1f">
            ${dotMap[rf][s]}</div>`;
        }
      } else if (hasDot) {
        h += `<div class="dot">${dotMap[rf][s]}</div>`;
      }
      h += `</div>`;
    }
    h += `</div></div>`;
  }

  if (baseFret > 1) h += `<div class="dgm-pos">${baseFret}° tasto</div>`;
  h += `</div>`; // .dgm
  return h;
}

// ─── STATE & UI ────────────────────────────────────────────────────────────
let mode='major', selKey=null, openId=null;

function setMode(m){
  mode=m; selKey=null; openId=null;
  document.getElementById('btn-major').classList.toggle('active',m==='major');
  document.getElementById('btn-minor').classList.toggle('active',m==='minor');
  renderKeys();
  document.getElementById('result').innerHTML='';
}

function renderKeys(){
  const g=document.getElementById('keyGrid'); g.innerHTML='';
  NOTES.forEach(note=>{
    const f=fb(note), hasFlat=f!==note;
    const btn=document.createElement('button');
    btn.className='key-btn'+(mode==='minor'?' minor-mode':'');
    if(selKey===note) btn.classList.add('sel');
    const suf=mode==='minor'?'m':'';
    btn.innerHTML=`<span>${note}${suf}</span>${hasFlat?`<span class="enh">${f}${suf}</span>`:''}`;
    btn.onclick=()=>{selKey=note;openId=null;renderKeys();mode==='major'?renderMaj(note):renderMin(note)};
    g.appendChild(btn);
  });
}

function toggle(id){
  const row=document.getElementById(id);
  if(!row) return;
  if(openId&&openId!==id){const p=document.getElementById(openId);if(p)p.classList.remove('open');}
  row.classList.toggle('open');
  openId=row.classList.contains('open')?id:null;
}

function chordsBlock(notes, qs, rs){
  return notes.map((note,i)=>{
    const sym=csym(note,qs[i]);
    const id='cr'+i+note+mode;
    const bc=i===0?'ton':i===4?'dom':'';
    return `
      <div class="chord-row" id="${id}">
        <div class="chord-sum" onclick="toggle('${id}')">
          <div class="cbadge ${bc}">${sym}</div>
          <div class="cinfo"><div class="cname">${sym}</div><div class="crole">${rs[i]}</div></div>
          <div class="chev">›</div>
        </div>
        <div class="tab-panel">
          <div class="tab-inner">${renderDiagram(note, qs[i])}</div>
        </div>
      </div>`;
  }).join('');
}

function renderMaj(r){
  const s=sc(r,MAJ_INT), rm=relMin(r);
  const pMin=sc(rm,PM), pMaj=sc(r,PMj);
  document.getElementById('result').innerHTML=`
  <div class="result">
    <div class="card">
      <div class="card-label">Scala pentatonica</div>
      <div class="penta-main"><div class="penta-key">${fb(rm)}m</div><div class="penta-sub">Pentatonica minore</div></div>
      <div class="notes-row">${pMin.map(n=>`<span class="note-tag">${fb(n)}</span>`).join('')}</div>
      <div class="div"></div>
      <div class="penta-main"><div class="penta-key dk" style="font-size:26px">${fb(r)}</div><div class="penta-sub">Pentatonica maggiore</div></div>
      <div class="notes-row">${pMaj.map(n=>`<span class="note-tag dk">${fb(n)}</span>`).join('')}</div>
      <div class="div"></div>
      <div class="hint"><strong>${fb(rm)}m</strong> è la relativa minore di ${fb(r)}: stesse note, sound blues e rock.</div>
    </div>
    <div class="chords-card">
      <div class="chords-head"><div class="card-label">Accordi della tonalità</div></div>
      ${chordsBlock(s,MQ,MR)}
    </div>
  </div>`;
}

function renderMin(r){
  const s=sc(r,MIN_INT), rm=relMaj(r);
  const pMin=sc(r,PM);
  document.getElementById('result').innerHTML=`
  <div class="result">
    <div class="card">
      <div class="card-label">Scala pentatonica</div>
      <div class="penta-main"><div class="penta-key dk">${fb(r)}m</div><div class="penta-sub">Pentatonica minore</div></div>
      <div class="notes-row">${pMin.map(n=>`<span class="note-tag dk">${fb(n)}</span>`).join('')}</div>
      <div class="div"></div>
      <div class="hint">Usa la pentatonica di <strong>${fb(r)}m</strong>. Le stesse note funzionano anche per la relativa maggiore <strong>${fb(rm)}</strong>.</div>
    </div>
    <div class="chords-card">
      <div class="chords-head"><div class="card-label">Accordi della tonalità</div></div>
      ${chordsBlock(s,mQ,mR)}
    </div>
  </div>`;
}

renderKeys();
document.getElementById('result').innerHTML=`
  <div class="empty"><div class="empty-icon">♩</div><div class="empty-text">Seleziona una tonalità</div></div>`;
</script>
