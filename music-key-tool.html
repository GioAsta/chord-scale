<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord & Scale</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0e10;
    --surface:  #16161a;
    --surface2: #1e1e24;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.04);
    --text:     #f0ede8;
    --text2:    #9b9690;
    --text3:    #55524e;

    /* Bowie palette */
    --gold:     #f5c842;
    --gold-bg:  rgba(245,200,66,0.12);
    --cyan:     #00e5d4;
    --cyan-bg:  rgba(0,229,212,0.10);
    --pink:     #ff3d7f;
    --pink-bg:  rgba(255,61,127,0.12);
    --lime:     #b8f230;
    --lime-bg:  rgba(184,242,48,0.10);

    --r: 14px;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 72px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 24px 0;
    max-width: 560px;
    margin: 0 auto;
    position: relative;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    letter-spacing: 2px;
    line-height: 0.92;
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 50%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-bolt {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    line-height: 0.92;
    color: var(--gold);
    -webkit-text-fill-color: var(--gold);
    margin-left: 6px;
    filter: drop-shadow(0 0 18px rgba(245,200,66,0.5));
  }

  .header p {
    font-size: 14px;
    color: var(--text2);
    margin-top: 10px;
    letter-spacing: 0.3px;
    font-style: italic;
  }

  /* ── SEGMENT ── */
  .segment {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    width: calc(100% - 48px);
    max-width: 320px;
    margin: 24px auto 0;
  }

  .seg-btn {
    flex: 1; padding: 9px 0; border: none; background: transparent;
    font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); border-radius: 100px; cursor: pointer; transition: all .25s;
  }

  .seg-btn.active {
    background: var(--gold);
    color: #0e0e10;
    box-shadow: 0 0 20px rgba(245,200,66,0.35);
  }

  .seg-btn.minor-active {
    background: var(--cyan);
    color: #0e0e10;
    box-shadow: 0 0 20px rgba(0,229,212,0.35);
  }

  /* ── KEY GRID ── */
  .key-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 20px;
    max-width: 560px;
    margin: 0 auto;
  }

  .key-btn {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7.5vw, 38px);
    letter-spacing: 1px;
    color: var(--text2);
    cursor: pointer;
    transition: all .18s ease;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1.15;
    position: relative;
    overflow: hidden;
  }

  .key-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--pink));
    opacity: 0;
    transition: opacity .18s;
  }

  .key-btn span { position: relative; z-index: 1; }
  .key-btn .enh { font-size: 9px; color: var(--text3); margin-top: 1px; position: relative; z-index: 1; font-family: 'Barlow', sans-serif; font-weight: 600; letter-spacing: 0.5px; }

  .key-btn:active { transform: scale(.90); }

  .key-btn.sel {
    border-color: var(--gold);
    color: #0e0e10;
    box-shadow: 0 0 24px rgba(245,200,66,0.4);
  }
  .key-btn.sel::before { opacity: 1; }
  .key-btn.sel .enh { color: rgba(0,0,0,0.6); }

  .key-btn.minor-mode { color: var(--text3); }
  .key-btn.minor-mode::before {
    background: linear-gradient(135deg, var(--cyan), #007aff);
  }
  .key-btn.minor-mode.sel {
    border-color: var(--cyan);
    color: #0e0e10;
    box-shadow: 0 0 24px rgba(0,229,212,0.4);
  }

  /* ── RESULT ── */
  .result {
    max-width: 560px; margin: 0 auto; padding: 0 20px;
    animation: fu .28s ease both;
  }
  @keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ── PENTA CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 16px;
  }

  .penta-main { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }

  .penta-key {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; letter-spacing: 1px;
    color: var(--gold); line-height: 1;
    text-shadow: 0 0 30px rgba(245,200,66,0.4);
  }
  .penta-key.cyan { color: var(--cyan); text-shadow: 0 0 30px rgba(0,229,212,0.4); }
  .penta-key.sm   { font-size: 32px; color: var(--text2); text-shadow: none; }

  .penta-sub { font-size: 13px; color: var(--text2); font-weight: 400; }

  .notes-row { display: flex; flex-wrap: wrap; gap: 7px; }

  .note-tag {
    background: var(--gold-bg);
    border: 1px solid rgba(245,200,66,0.25);
    color: var(--gold);
    font-size: 13px; font-weight: 700;
    padding: 5px 12px; border-radius: 100px;
    letter-spacing: 0.3px;
  }
  .note-tag.cyan {
    background: var(--cyan-bg);
    border-color: rgba(0,229,212,0.2);
    color: var(--cyan);
  }

  .divider { height: 1px; background: var(--border2); margin: 16px 0; }

  .hint { font-size: 12px; color: var(--text2); line-height: 1.6; font-style: italic; }
  .hint strong { color: var(--text); font-style: normal; font-weight: 700; }

  /* ── CHORDS CARD ── */
  .chords-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .chords-head { padding: 18px 22px 6px; }

  .chord-row { border-bottom: 1px solid var(--border2); }
  .chord-row:last-child { border-bottom: none; }

  .chord-sum {
    display: flex; align-items: center;
    padding: 13px 22px; cursor: pointer; gap: 14px;
    user-select: none; -webkit-user-select: none;
    transition: background .15s;
  }
  .chord-sum:active { background: rgba(255,255,255,.03); }

  .cbadge {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 0.5px;
    color: var(--text2); flex-shrink: 0;
  }
  .cbadge.ton {
    background: var(--gold-bg);
    border-color: rgba(245,200,66,0.3);
    color: var(--gold);
    box-shadow: 0 0 12px rgba(245,200,66,0.15);
  }
  .cbadge.dom {
    background: var(--pink-bg);
    border-color: rgba(255,61,127,0.25);
    color: var(--pink);
  }

  .cinfo { flex: 1; min-width: 0; }
  .cname {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.5px; color: var(--text);
  }
  .crole { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.2px; }

  .chev { font-size: 18px; color: var(--text3); transition: transform .22s; flex-shrink: 0; }
  .chord-row.open .chev { transform: rotate(90deg); color: var(--gold); }

  .tab-panel { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .chord-row.open .tab-panel { max-height: 360px; }

  .tab-inner {
    padding: 6px 22px 20px;
    display: flex; justify-content: center;
    background: var(--surface2);
    border-top: 1px solid var(--border2);
  }

  /* ── DIAGRAM ── */
  .dgm { display: inline-block; user-select: none; }
  .dgm-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px;
    text-align: center; margin-bottom: 6px;
    color: var(--gold);
  }

  .dgm-top { display: flex; align-items: flex-end; margin-bottom: 3px; }
  .dgm-top-spacer { width: 20px; flex-shrink: 0; }
  .dgm-top-cells { display: flex; }
  .dgm-top-cell {
    width: 28px; text-align: center;
    font-size: 12px; font-weight: 700;
    color: var(--text2); line-height: 1;
  }
  .dgm-top-cell.x { color: var(--pink); }

  .dgm-nut-row { display: flex; align-items: center; }
  .dgm-nut-spacer { width: 20px; flex-shrink: 0; }
  .dgm-nut { flex: 1; height: 5px; background: var(--text); border-radius: 2px; }

  .dgm-row { display: flex; align-items: center; }
  .dgm-fnum {
    width: 20px; font-size: 9px; color: var(--text3);
    text-align: right; padding-right: 4px; flex-shrink: 0; line-height: 28px;
    font-weight: 600;
  }
  .dgm-cells { display: flex; border-left: 1.5px solid var(--text3); }
  .dgm-cell {
    width: 28px; height: 28px;
    border-right: 1.5px solid var(--text3);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .dgm-row:last-child .dgm-cell { border-bottom: none; }
  .dgm-row:first-child .dgm-cell { border-top: 1px solid var(--border); }

  .dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; color: #0e0e10;
    position: relative; z-index: 2;
    box-shadow: 0 0 8px rgba(245,200,66,0.5);
  }

  .dgm-pos {
    font-size: 10px; color: var(--text3);
    text-align: center; margin-top: 5px;
    font-weight: 600; letter-spacing: 0.5px;
  }

  /* ── VARIATION ROWS ── */
  .var-row { background: rgba(255,255,255,0.015); }
  .var-row .chord-sum { padding-left: 32px; }

  .vbadge { font-family: 'Barlow', sans-serif; font-size: 10px !important; font-weight: 700; letter-spacing: 0.5px; }
  .var-maj7 { background: rgba(0,229,212,0.10) !important; color: var(--cyan) !important; border-color: rgba(0,229,212,0.2) !important; }
  .var-7    { background: rgba(255,61,127,0.10) !important; color: var(--pink) !important; border-color: rgba(255,61,127,0.2) !important; }
  .var-9    { background: rgba(184,242,48,0.10) !important; color: var(--lime) !important; border-color: rgba(184,242,48,0.2) !important; }
  .var-sus  { background: rgba(160,130,255,0.10) !important; color: #b388ff !important; border-color: rgba(160,130,255,0.2) !important; }
  .var-dim  { background: rgba(255,149,0,0.10) !important; color: #ff9500 !important; border-color: rgba(255,149,0,0.2) !important; }
  .var-other{ background: var(--surface2) !important; color: var(--text2) !important; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 24px; }
  .empty-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0.25;
    margin-bottom: 14px;
  }
  .empty-text { font-size: 15px; color: var(--text3); font-style: italic; }

  /* ── DECORATIVE STRIPE ── */
  .stripe {
    height: 3px;
    background: linear-gradient(90deg, var(--pink), var(--gold), var(--cyan), var(--lime), var(--pink));
    background-size: 200%;
    animation: stripe-anim 4s linear infinite;
    margin: 28px 0 0;
  }
  @keyframes stripe-anim { 0%{background-position:0%} 100%{background-position:200%} }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">✦ Guitar Reference Tool</div>
  <div>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,80px);letter-spacing:2px;line-height:0.92;background:linear-gradient(135deg,#f5c842 0%,#ff3d7f 50%,#00e5d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">CHORD</span><span class="header-bolt">⚡</span><span style="font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,80px);letter-spacing:2px;line-height:0.92;background:linear-gradient(135deg,#f5c842 0%,#ff3d7f 50%,#00e5d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">SCALE</span>
  </div>
  <p>Tonalità · Accordi · Pentatonica</p>
</div>

<div class="stripe"></div>

<div class="segment" id="segment">
  <button class="seg-btn active" onclick="setMode('major')" id="btn-major">Maggiori</button>
  <button class="seg-btn" onclick="setMode('minor')" id="btn-minor">Minori</button>
</div>

<div class="key-grid" id="keyGrid"></div>
<div id="result"></div>

<script>
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const fb=n=>FLAT[n]||n;

const MAJ_INT=[0,2,4,5,7,9,11], MIN_INT=[0,2,3,5,7,8,10];
const PM=[0,3,5,7,10], PMj=[0,2,4,7,9];
const sc=(r,iv)=>{const i=NOTES.indexOf(r);return iv.map(x=>NOTES[(i+x)%12])};
const relMin=r=>NOTES[(NOTES.indexOf(r)+9)%12];
const relMaj=r=>NOTES[(NOTES.indexOf(r)+3)%12];

const MQ=['maj','min','min','maj','maj','min','dim'];
const MR=['I – Tonica','II – Supertonica','III – Mediante','IV – Sottodominante','V – Dominante','VI – Rel. minore','VII – Sensibile'];
const mQ=['min','dim','maj','min','min','maj','maj'];
const mR=['I – Tonica','II – Sopratonica','III – Mediante','IV – Sottodominante','V – Dominante','VI – Sopradominante','VII – Sottotonica'];

function csym(note,q){const n=fb(note);return q==='maj'?n:q==='min'?n+'m':n+'°'}

// ─── VARIATIONS DATABASE ───────────────────────────────────────────────────
const VARS = {
  maj: {
    'C': [
      { label:'Cmaj7',  open:['x',null,null,'o','o','o'], baseFret:1, dots:[[1,3,3],[2,2,2]] },
      { label:'C7',     open:['x','o',null,null,null,'o'], baseFret:1, dots:[[1,3,3],[2,2,2],[4,1,1],[3,3,4]] },
      { label:'Cadd9',  open:['x','o',null,null,null,null], baseFret:1, dots:[[1,3,3],[2,2,2],[4,3,4],[5,0,'x']] },
      { label:'Csus2',  open:['x','o',null,null,null,'o'], baseFret:1, dots:[[1,3,3],[2,2,2]] },
      { label:'Csus4',  open:['x','o',null,null,null,'o'], baseFret:1, dots:[[1,3,3],[2,2,2],[3,1,1],[4,1,1]] },
    ],
    'D': [
      { label:'Dmaj7',  open:['x','x','o',null,null,null], baseFret:1, dots:[[3,2,1],[4,2,2],[5,2,3]] },
      { label:'D7',     open:['x','x','o',null,null,null], baseFret:1, dots:[[3,2,1],[4,1,2],[5,2,3]] },
      { label:'Dadd9',  open:['x','x','o',null,'o',null], baseFret:1, dots:[[3,2,1],[4,3,3],[5,0,'o']] },
      { label:'Dsus2',  open:['x','x','o',null,'o','o'], baseFret:1, dots:[[3,2,1]] },
      { label:'Dsus4',  open:['x','x','o',null,null,null], baseFret:1, dots:[[3,2,1],[4,3,3],[5,3,4]] },
    ],
    'E': [
      { label:'Emaj7',  open:[null,'o','o',null,'o','o'], baseFret:1, dots:[[0,2,2],[1,2,3]] },
      { label:'E7',     open:[null,'o','o','o','o','o'], baseFret:1, dots:[[0,2,2],[1,2,3]] },
      { label:'Eadd9',  open:[null,'o','o',null,'o',null], baseFret:1, dots:[[0,2,2],[1,2,3],[3,1,1],[5,2,4]] },
      { label:'Esus2',  open:[null,'o','o','o','o','o'], baseFret:1, dots:[[0,2,2],[1,2,3]] },
      { label:'Esus4',  open:[null,'o','o',null,'o','o'], baseFret:1, dots:[[0,2,2],[1,2,3],[3,2,4]] },
    ],
    'F': [
      { label:'Fmaj7',  open:[null,null,null,null,null,null], baseFret:1, barre:{fret:1,fromStr:0,toStr:5}, dots:[[2,2,2],[3,2,3]] },
      { label:'F7',     open:[null,null,null,null,null,null], baseFret:1, barre:{fret:1,fromStr:0,toStr:5}, dots:[[1,3,3],[2,3,4]] },
      { label:'Fadd9',  open:[null,null,null,null,null,null], baseFret:1, barre:{fret:1,fromStr:0,toStr:5}, dots:[[1,3,3],[2,3,4],[5,3,4]] },
      { label:'Fsus2',  open:[null,null,null,null,null,null], baseFret:1, barre:{fret:1,fromStr:0,toStr:4}, dots:[[1,3,3],[2,3,4]] },
      { label:'Fsus4',  open:[null,null,null,null,null,null], baseFret:1, barre:{fret:1,fromStr:0,toStr:5}, dots:[[1,3,3],[2,3,4],[3,3,4]] },
    ],
    'G': [
      { label:'Gmaj7',  open:[null,null,null,'o','o',null], baseFret:1, dots:[[0,3,2],[1,2,1],[5,2,4]] },
      { label:'G7',     open:[null,null,null,'o','o',null], baseFret:1, dots:[[0,3,2],[1,2,1],[5,1,1]] },
      { label:'Gadd9',  open:[null,null,'o','o','o',null], baseFret:1, dots:[[0,3,2],[1,2,1],[5,3,4]] },
      { label:'Gsus2',  open:[null,null,'o','o','o','o'], baseFret:1, dots:[[0,3,2],[1,2,1]] },
      { label:'Gsus4',  open:[null,null,null,'o','o',null], baseFret:1, dots:[[0,3,2],[1,2,1],[3,1,1],[5,3,4]] },
    ],
    'A': [
      { label:'Amaj7',  open:['x','o',null,null,null,'o'], baseFret:1, dots:[[2,2,1],[3,2,2],[4,1,3]] },
      { label:'A7',     open:['x','o',null,null,'o','o'], baseFret:1, dots:[[2,2,1],[3,2,2]] },
      { label:'Aadd9',  open:['x','o','o',null,null,'o'], baseFret:1, dots:[[3,2,2],[4,2,3]] },
      { label:'Asus2',  open:['x','o','o',null,'o','o'], baseFret:1, dots:[[3,2,2]] },
      { label:'Asus4',  open:['x','o',null,null,null,'o'], baseFret:1, dots:[[2,2,1],[3,2,2],[4,3,3]] },
    ],
    'B': [
      { label:'Bmaj7',  open:['x',null,null,null,null,null], baseFret:2, barre:{fret:2,fromStr:1,toStr:5}, dots:[[1,4,3],[2,3,2]] },
      { label:'B7',     open:['x',null,'o',null,'o',null], baseFret:1, dots:[[0,2,1],[2,4,4],[3,2,2],[5,2,3]] },
      { label:'Badd9',  open:['x',null,null,null,null,null], baseFret:2, barre:{fret:2,fromStr:1,toStr:5}, dots:[[1,4,3],[2,4,4],[5,4,4]] },
      { label:'Bsus2',  open:['x',null,null,null,null,null], baseFret:2, barre:{fret:2,fromStr:1,toStr:5}, dots:[[1,4,3]] },
      { label:'Bsus4',  open:['x',null,null,null,null,null], baseFret:2, barre:{fret:2,fromStr:1,toStr:5}, dots:[[1,4,3],[2,4,4],[3,5,4]] },

function getVars(note, quality) {
  const key = quality==='maj'?'maj': quality==='min'?'min':'dim';
  return (VARS[key]&&VARS[key][note]) || [];
}

// ─── SHARED DIAGRAM RENDERER ───────────────────────────────────────────────
function renderDiagramFromData(data, label) {
  if (!data) return `<div style="font-size:12px;color:var(--text3);padding:20px 0;text-align:center;font-style:italic">Diagramma non disponibile</div>`;
  const {open, baseFret, dots, barre} = data;
  const FRETS=4, STR=6;
  const dotMap={};
  (dots||[]).forEach(([str,fret,finger])=>{
    if(finger==='o'||finger==='x') return;
    const rf=fret-baseFret+1;
    if(rf<1||rf>FRETS) return;
    if(!dotMap[rf])dotMap[rf]={};
    dotMap[rf][str]=finger;
  });
  let h=`<div class="dgm">`;
  h+=`<div class="dgm-title">${label}</div>`;
  h+=`<div class="dgm-top"><div class="dgm-top-spacer"></div><div class="dgm-top-cells">`;
  for(let s=0;s<STR;s++){
    const o=open[s];
    if(o==='x') h+=`<div class="dgm-top-cell x">×</div>`;
    else if(o==='o') h+=`<div class="dgm-top-cell">○</div>`;
    else h+=`<div class="dgm-top-cell"></div>`;
  }
  h+=`</div></div>`;
  if(baseFret===1) h+=`<div class="dgm-nut-row"><div class="dgm-nut-spacer"></div><div class="dgm-nut"></div></div>`;
  for(let rf=1;rf<=FRETS;rf++){
    const af=baseFret+rf-1;
    h+=`<div class="dgm-row"><div class="dgm-fnum">${af}</div><div class="dgm-cells">`;
    const hasB=barre&&barre.fret===af;
    for(let s=0;s<STR;s++){
      const inB=hasB&&s>=barre.fromStr&&s<=barre.toStr;
      const hasDot=dotMap[rf]&&dotMap[rf][s]!==undefined;
      h+=`<div class="dgm-cell" style="position:relative">`;
      if(inB){
        if(s===barre.fromStr){
          const span=(barre.toStr-barre.fromStr+1)*28;
          h+=`<div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);width:${span-8}px;height:20px;background:var(--gold);border-radius:10px;z-index:3;box-shadow:0 0 10px rgba(245,200,66,0.5)"></div>`;
        }
        if(hasDot) h+=`<div class="dot" style="z-index:4;background:#0e0e10;color:var(--gold);border:2px solid var(--gold)">${dotMap[rf][s]}</div>`;
      } else if(hasDot){
        h+=`<div class="dot">${dotMap[rf][s]}</div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  if(baseFret>1) h+=`<div class="dgm-pos">${baseFret}° TASTO</div>`;
  h+=`</div>`;
  return h;
}

function renderDiagram(key, quality) {
  const sym = quality==='min'?key+'m':quality==='dim'?key+'°':key;
  return renderDiagramFromData(DB[sym], sym);
}

let mode='major', selKey=null, openId=null;

function setMode(m){
  mode=m; selKey=null; openId=null;
  const bMaj=document.getElementById('btn-major');
  const bMin=document.getElementById('btn-minor');
  bMaj.className='seg-btn'+(m==='major'?' active':'');
  bMin.className='seg-btn'+(m==='minor'?' minor-active':'');
  renderKeys();
  document.getElementById('result').innerHTML='';
}

function renderKeys(){
  const g=document.getElementById('keyGrid'); g.innerHTML='';
  NOTES.forEach(note=>{
    const f=fb(note), hasFlat=f!==note;
    const btn=document.createElement('button');
    btn.className='key-btn'+(mode==='minor'?' minor-mode':'');
    if(selKey===note) btn.classList.add('sel');
    const suf=mode==='minor'?'m':'';
    btn.innerHTML=`<span>${note}${suf}</span>${hasFlat?`<span class="enh">${f}${suf}</span>`:''}`;
    btn.onclick=()=>{selKey=note;openId=null;renderKeys();mode==='major'?renderMaj(note):renderMin(note)};
    g.appendChild(btn);
  });
}

function toggle(id){
  const row=document.getElementById(id);
  if(!row) return;
  if(openId&&openId!==id){const p=document.getElementById(openId);if(p)p.classList.remove('open');}
  row.classList.toggle('open');
  openId=row.classList.contains('open')?id:null;
}

function varLabel(lbl) {
  // detect type for color
  if(/maj7|M7/.test(lbl)) return 'var-maj7';
  if(/m7b5|dim7/.test(lbl)) return 'var-dim';
  if(/7/.test(lbl)) return 'var-7';
  if(/add9|9/.test(lbl)) return 'var-9';
  if(/sus/.test(lbl)) return 'var-sus';
  return 'var-other';
}

function chordsBlock(notes,qs,rs){
  return notes.map((note,i)=>{
    const sym=csym(note,qs[i]);
    const id='cr'+i+note+mode;
    const bc=i===0?'ton':i===4?'dom':'';
    const variations=getVars(note, qs[i]);

    // Variation rows (each as a sub-row inside the same group)
    const varRows = variations.map((v,vi)=>{
      const vid='var'+i+vi+note+mode;
      const flatLabel = v.label
        .replace(/C#/g,'C#/Db').replace(/D#/g,'D#/Eb')
        .replace(/F#/g,'F#/Gb').replace(/G#/g,'G#/Ab').replace(/A#/g,'A#/Bb');
      // keep label short — just the flat notation not the slash version for display
      const dispLabel = v.label
        .replace(/C#/g,fb('C#')).replace(/D#/g,fb('D#'))
        .replace(/F#/g,fb('F#')).replace(/G#/g,fb('G#')).replace(/A#/g,fb('A#'));
      const vc=varLabel(v.label);
      return `
        <div class="chord-row var-row" id="${vid}">
          <div class="chord-sum" onclick="toggle('${vid}')">
            <div class="cbadge vbadge ${vc}">${dispLabel.replace(/(.+?)(maj7|mM7|m7b5|dim7|sus[24]|add9|m9|M7|7|9)/,'$2')}</div>
            <div class="cinfo">
              <div class="cname" style="font-size:16px">${dispLabel}</div>
              <div class="crole">Variazione di ${sym}</div>
            </div>
            <div class="chev">›</div>
          </div>
          <div class="tab-panel">
            <div class="tab-inner">${renderDiagramFromData(v, dispLabel)}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="chord-row" id="${id}">
        <div class="chord-sum" onclick="toggle('${id}')">
          <div class="cbadge ${bc}">${sym}</div>
          <div class="cinfo"><div class="cname">${sym}</div><div class="crole">${rs[i]}</div></div>
          <div class="chev">›</div>
        </div>
        <div class="tab-panel">
          <div class="tab-inner">${renderDiagram(note,qs[i])}</div>
        </div>
      </div>
      ${varRows}`;
  }).join('');
}

function renderMaj(r){
  const s=sc(r,MAJ_INT), rm=relMin(r);
  const pMin=sc(rm,PM), pMaj=sc(r,PMj);
  document.getElementById('result').innerHTML=`
  <div class="result">
    <div class="card">
      <div class="card-label">Scala pentatonica consigliata</div>
      <div class="penta-main"><div class="penta-key">${fb(rm)}m</div><div class="penta-sub">Pentatonica minore</div></div>
      <div class="notes-row">${pMin.map(n=>`<span class="note-tag">${fb(n)}</span>`).join('')}</div>
      <div class="divider"></div>
      <div class="penta-main"><div class="penta-key sm">${fb(r)}</div><div class="penta-sub">Pentatonica maggiore</div></div>
      <div class="notes-row">${pMaj.map(n=>`<span class="note-tag cyan">${fb(n)}</span>`).join('')}</div>
      <div class="divider"></div>
      <div class="hint"><strong>${fb(rm)}m</strong> è la relativa minore di ${fb(r)}: stesse note, sound blues e rock.</div>
    </div>
    <div class="chords-card">
      <div class="chords-head"><div class="card-label">Accordi della tonalità</div></div>
      ${chordsBlock(s,MQ,MR)}
    </div>
  </div>`;
}

function renderMin(r){
  const s=sc(r,MIN_INT), rm=relMaj(r);
  const pMin=sc(r,PM);
  document.getElementById('result').innerHTML=`
  <div class="result">
    <div class="card">
      <div class="card-label">Scala pentatonica</div>
      <div class="penta-main"><div class="penta-key cyan">${fb(r)}m</div><div class="penta-sub">Pentatonica minore</div></div>
      <div class="notes-row">${pMin.map(n=>`<span class="note-tag cyan">${fb(n)}</span>`).join('')}</div>
      <div class="divider"></div>
      <div class="hint">Usa la pentatonica di <strong>${fb(r)}m</strong>. Le stesse note funzionano anche per la relativa maggiore <strong>${fb(rm)}</strong>.</div>
    </div>
    <div class="chords-card">
      <div class="chords-head"><div class="card-label">Accordi della tonalità</div></div>
      ${chordsBlock(s,mQ,mR)}
    </div>
  </div>`;
}
